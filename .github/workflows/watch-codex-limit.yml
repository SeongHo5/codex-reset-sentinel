name: Watch Codex limit updates

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: codex-limit-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: |
          npm run lint
          npm run typecheck
          npm test

      - name: Run watcher
        env:
          SEARCH_PROVIDER: brave
          SEARCH_FRESHNESS: pw
          SEARCH_COUNT: "20"
          ALERT_LOCALE: ko
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: npm run watch

      - name: Commit state if changed
        run: |
          if git diff --quiet -- .state/codex-limit-watch.json; then
            echo "No state changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .state/codex-limit-watch.json
          # Automated state commits use medium confidence because live search freshness and Discord delivery
          # depend on external services even when local tests and workflow steps pass.
          git commit -m "Persist codex limit sentinel search state after polling" \
            -m "Constraint: GitHub Actions owns repo state commits; the Node app only writes JSON state." \
            -m "Confidence: medium" \
            -m "Scope-risk: narrow" \
            -m "Tested: npm run lint; npm run typecheck; npm test" \
            -m "Not-tested: Live Discord delivery depends on configured webhook secret and Search API result freshness."
          git push
